# nats_consumer integration-test compose stack.
#
# Two services:
#   - nats:      JetStream-enabled nats-server, plus the nats CLI via
#                image. Exposes 4222 (client) and 8222 (monitor).
#   - opensips:  container built from Dockerfile in this directory;
#                loads event_nats.so + nats_consumer.so and runs the
#                minimal opensips.cfg. MI FIFO is at /var/run/opensips/mi.
#
# Usage:
#   docker compose -f docker-compose.yaml build
#   docker compose -f docker-compose.yaml up -d
#   bash test_fetch_sync.sh
#   docker compose -f docker-compose.yaml down -v

services:
  nats:
    image: nats:2.10-alpine
    command: -js -m 8222
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 10

  # nats CLI in a separate container so the harness can script stream /
  # consumer / publish commands without requiring the nats CLI to be
  # installed on the host.  The CLI runs one-shot invocations and exits.
  natscli:
    image: natsio/nats-box:latest
    depends_on:
      nats:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "sleep infinity"]

  opensips:
    build:
      context: ../../..
      dockerfile: modules/nats_consumer/tests/Dockerfile
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
    ports:
      - "5060:5060/udp"
    volumes:
      - mi:/var/run/opensips

volumes:
  mi:
