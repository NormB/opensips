####### nats_consumer integration test cfg ########################
#
# Minimal opensips.cfg used by the docker-compose test harness.  It
# boots opensips with:
#   - mi_fifo at /var/run/opensips/mi.fifo so the tests can drive the
#     registry and read counters.
#   - event_nats pointed at the `nats` compose service (hostname
#     resolution via docker DNS).
#   - nats_consumer with a pre-bound durable handle `test` on stream
#     TEST (filter test.in).
#   - timer_route that drains the `test` handle every second so the
#     harness only has to publish on `test.in` to exercise the path.
#   - event_route[test_incoming] fired for each pop so the harness can
#     watch stdout for a "got test.in:<payload>" line.
#
# The harness does not rely on this being the only possible cfg -- the
# tests that need custom bindings call nats_consumer_bind over MI after
# opensips is up.

log_level=3
xlog_level=3
stderror_enabled=yes
syslog_facility=LOG_LOCAL0

udp_workers=4
tcp_workers=0

socket=udp:0.0.0.0:5060

####### loaded modules #############################################

mpath="/usr/local/lib64/opensips/modules/"

loadmodule "proto_udp.so"
loadmodule "mi_fifo.so"
modparam("mi_fifo", "fifo_name", "/var/run/opensips/mi.fifo")

loadmodule "event_nats.so"
modparam("event_nats", "nats_url", "nats://nats:4222")

loadmodule "nats_consumer.so"
# Persistence deliberately off by default -- most tests want an empty
# registry at boot.  stress_churn re-enables it at runtime with a
# dedicated config via MI.

####### routes #####################################################

startup_route {
    xlog("L_INFO", "nats_consumer: startup\n");
    # Caller tests bind their own handles via MI after the harness is
    # up.  nats_consumer_bind is exposed only as an MI command, not as
    # a script function, so pre-binds happen via mi_fifo from run.sh.
}

timer_route[drain_test, 1] {
    if (nats_fetch("test", 100)) {
        xlog("L_INFO", "got test.in: $nats_data\n");
        nats_ack();
    }
}

# stress_multi_worker drain.  The handle 'mw' is bound at runtime by
# the stress test; this route drains a chunk of up to 100 messages and
# acks them so the consumer does not stall at max_ack_pending.  When
# 'mw' is not bound (unrelated tests) the fetch returns -3 and we
# silently fall through.
timer_route[drain_mw, 1] {
    # nats_fetch returns 1 on a delivered message; we ack and re-fetch
    # in a small unrolled chain.  OpenSIPS script has no `while` loop,
    # so a fixed unroll caps the per-tick drain to 16 messages -- the
    # 1 s tick combined with N=10000 publishes finishes in ~10 minutes.
    # If the test ever stresses higher N, raise this unroll or fetch
    # batch size.
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
    if (nats_fetch("mw", 1000)) { nats_ack(); }
}

# stress_ack_wait_expiry uses handle 'ae' but DELIBERATELY does NOT
# drain it (the contract is "ack_wait expiry forces redelivery without
# an ack"). No drain route here on purpose.

# Generic catch-all drain for stress_churn's ephemeral churn handles
# (id="c_<ts>") + the long-lived 'mw' handle that test piggybacks on.
# Adding it here keeps the churn loop honest: ephemeral handles that
# never see a fetch get GC'd by the broker on inactive_threshold,
# which is the property under test.

route {
    # No SIP handling needed; UDP listener exists only to keep the
    # opensips main loop spinning.
    exit;
}
