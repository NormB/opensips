# Comprehensive OpenSIPS test config — exercises both compiled-in
# functions AND rust_exec() user-script handlers.
#
# Usage: opensips -c -f modules/rust/tests/integration/opensips-full-test.cfg
#        opensips -f modules/rust/tests/integration/opensips-full-test.cfg  (run)
#
# Requires:
#   - rust.so module deployed
#   - sl.so, tm.so, signaling.so, textops.so in module path
#   - User script .so deployed (libmy_opensips_handler.so)

mpath="/usr/local/lib64/opensips/modules/"

loadmodule "proto_udp.so"
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "signaling.so"
loadmodule "sipmsgops.so"
loadmodule "textops.so"
loadmodule "rust.so"

# Compiled-in module parameters
modparam("rust", "max_rate", 100)
modparam("rust", "window_seconds", 60)
modparam("rust", "cache_ttl", 300)
modparam("rust", "http_timeout", 2)
modparam("rust", "pool_size", 4)

# User script path
modparam("rust", "script_name",
    "/usr/local/lib64/opensips/scripts/libmy_opensips_handler.so")

socket=udp:127.0.0.1:5060

route {
    # ── Compiled-in rate limiter ──
    if (!rust_check_rate()) {
        exit;
    }

    # ── User-script caller screening ──
    # For local testing: use X-Test-Block header to simulate a blocked IP,
    # since SIPp always sends from 127.0.0.1 which isn't in the blacklist.
    if (is_present_hf("X-Test-Block")) {
        sl_send_reply(403, "Forbidden");
        exit;
    }

    # Run user-script handlers in sequence
    rust_exec("request_logger");
    rust_exec("set_routing_flags");
    rust_exec("append_custom_header", "full-test");
    rust_exec("log_user_agent");

    # Check compiled-in cache
    if (rust_cache_lookup()) {
        t_relay();
        exit;
    }

    # UA-based rate limiting (low limit for testing: 10 req/min)
    rust_exec("rate_limit_by_ua", "10");

    # ── Variable exchange: config sets $var(input), Rust writes $var(output) ──
    $var(input) = "uppercase:hello from opensips";
    rust_exec("variable_exchange");
    # After this: $var(output) = "HELLO FROM OPENSIPS", $var(rc) = "ok"

    # ── Persistent per-worker counter ──
    rust_exec("call_counter");
    # After this: $var(count) = "<N>", $var(counter_name) = "default"

    # ── Cross-worker atomic shared counter ──
    rust_counter_inc();
    # After this: $var(shared_count) = "<total across all workers, exact>"

    # ── PV manipulation: read/write pseudo-variables of all types ──
    $var(pv_input) = "full-test-value";
    rust_exec("pv_manipulation");
    # After this: $var(pv_type) = "string", $var(pv_int_test) = 42,
    #             $var(pv_result) = summary string

    # ── AVP operations: transaction-scoped variables ──
    rust_exec("avp_operations");
    # After this: $avp(rust_caller_ip) = source IP,
    #             $avp(rust_call_type) = "invite"/"register"/"other",
    #             $avp(rust_payload) = variable-length string (8-2048 bytes),
    #             $avp(rust_tag) = "processed" (stacked with "rust-module")

    # ── PV edge case testing ──
    # Create an AVP, then delete it with $null — Rust must handle gracefully
    $avp(edge_test) = "exists";
    $avp(edge_test) = NULL;
    # Note: OpenSIPS config parser doesn't support empty string literals.
    # The handler tests empty strings by writing one from Rust itself.
    rust_exec("pv_edge_cases");
    # After: $var(edge_result) = "pass", $var(edge_checks) = N

    # ── HTTP query: raw TCP HTTP/1.0 client (no external deps) ──
    # Without a URL param, the handler writes placeholder PVs and returns 1.
    # With a URL: rust_exec("http_query", "http://example.com/api")
    rust_exec("http_query");
    # After: $var(http_status), $var(http_body), $var(http_time_ms)

    # ── JSON parsing: config builds JSON, Rust parses with serde_json ──
    # Mode 1: config provides JSON via $var(json_input)
    $var(json_input) = "{\"method\":\"INVITE\",\"src_ip\":\"10.0.0.1\",\"src_port\":5060,\"reason\":\"full-test\"}";
    rust_exec("json_parse");
    # After: $var(json_parsed) = "ok", $var(json_method) = "INVITE",
    #         $var(json_src_ip) = "10.0.0.1", $var(json_fields) = field list

    sl_send_reply(200, "OK");
}

# ── Async HTTP query — demonstrates non-blocking I/O ──
# Wrap rust_exec in async() to avoid blocking the SIP worker during HTTP calls.
# The resume route runs when the HTTP response arrives.
#
# With a real HTTP server running:
#   async(rust_exec("http_query", "http://127.0.0.1:8080/test"), async_http_done);
#
# Without a URL (sync fallback — safe for testing without a server):
route[async_test] {
    async(rust_exec("http_query"), async_http_done);
}

route[async_http_done] {
    xlog("L_INFO", "async result: status=$var(http_status) time=$var(http_time_ms)ms\n");
    if ($var(http_json)) {
        xlog("L_INFO", "async json: $var(http_json)\n");
    }
    sl_send_reply(200, "OK");
}

# reply_handler is designed for onreply_route (rust_exec flags: REQUEST_ROUTE | ONREPLY_ROUTE)
# onreply_route[rust_replies] {
#     rust_exec("reply_handler");
# }
