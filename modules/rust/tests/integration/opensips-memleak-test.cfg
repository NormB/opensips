# OpenSIPS config for memory leak detection.
#
# Key settings:
#   - children=1: single worker for clean memory tracking
#   - mi_fifo loaded: allows memory stats queries via opensips-cli
#   - High rate limits: prevent interference with memory test
#   - Every handler exercised per request: maximizes leak surface
#
# Usage:
#   opensips -c -f modules/rust/tests/integration/opensips-memleak-test.cfg
#   opensips -f modules/rust/tests/integration/opensips-memleak-test.cfg

mpath="/usr/local/lib64/opensips/modules/"

# Single worker for clean memory tracking
udp_workers=1

loadmodule "proto_udp.so"
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "signaling.so"
loadmodule "sipmsgops.so"
loadmodule "textops.so"
loadmodule "mi_fifo.so"
loadmodule "rust.so"

# MI FIFO for memory stats queries
modparam("mi_fifo", "fifo_name", "/tmp/opensips_memleak_fifo")

# High rate limits so they don't interfere with the memory test
modparam("rust", "max_rate", 100000)
modparam("rust", "window_seconds", 60)
modparam("rust", "cache_ttl", 300)
modparam("rust", "http_timeout", 2)
modparam("rust", "pool_size", 4)

# User script
modparam("rust", "script_name",
    "/usr/local/lib64/opensips/scripts/libmy_opensips_handler.so")

socket=udp:127.0.0.1:5060

route {
    # Exercise every handler to maximize leak surface area.
    # The compiled-in rate limiter goes first.
    check_rate();

    # User-script handlers — each one allocates/deallocates differently.
    rust_exec("hello_world");
    rust_exec("greet", "memleak-test");
    rust_exec("log_user_agent");
    rust_exec("append_custom_header", "memleak");
    rust_exec("request_logger");
    rust_exec("set_routing_flags");
    rust_exec("number_portability");
    rust_exec("rate_limit_by_ua", "100000");

    # Variable exchange: config → Rust → config
    $var(input) = "uppercase:memleak-test";
    rust_exec("variable_exchange");

    # Persistent per-worker counter
    rust_exec("call_counter", "memleak");

    # Cross-worker shared counter (atomic, in shared memory)
    rust_exec("shared_counter");
    # OR directly: counter_inc();

    # PV manipulation: reads core PVs, writes $var types (string + integer)
    $var(pv_input) = "memleak-pv-test";
    rust_exec("pv_manipulation");

    # AVP operations: writes $avp types (string + integer + stacking)
    rust_exec("avp_operations");

    # PV edge case testing: create AVP, delete it, feed to Rust
    $avp(edge_test) = "exists";
    $avp(edge_test) = NULL;
    # Note: OpenSIPS config parser doesn't support empty string literals.
    # The handler tests empty strings by writing one from Rust itself.
    rust_exec("pv_edge_cases");

    # HTTP query: no-URL mode writes placeholders (no network I/O during leak test)
    rust_exec("http_query");

    # JSON parsing: exercises serde_json alloc/dealloc on every request
    $var(json_input) = "{\"method\":\"INVITE\",\"src_ip\":\"10.0.0.1\",\"src_port\":5060,\"leak_test\":true}";
    rust_exec("json_parse");

    sl_send_reply(200, "OK");
}
