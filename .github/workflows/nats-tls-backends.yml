# NATS TLS smoke CI for v4.0-nats-rc1+.
#
# The NATS user modules (cachedb_nats, event_nats, nats_consumer)
# route TLS through tls_mgm using a 'nats' client_domain; the legacy
# nats_tls_openssl / nats_tls_wolfssl wrapper modules and their dual-
# backend matrix are gone.  This workflow is the smoke that pins the
# tls_mgm-routing path: a real nats-server with TLS, OpenSIPS booted
# with tls_mgm + cachedb_nats, the handshake completing end-to-end,
# plus four negative scenarios that exercise the operator-error path.
#
# The single source of truth is lib/nats/tests/test_tls_mgm_smoke.sh
# which is what we exec at the end -- so any expansion of the smoke
# (TLS over a wolfSSL-backed libnats, etc.) extends the shell test
# rather than this workflow.
#
# Security note: every `run:` block uses only literal strings and
# env:-set version pins.  No untrusted github.event.* values are
# interpolated into shell commands.

name: NATS TLS Backends

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - 'lib/nats/**'
      - 'modules/event_nats/**'
      - 'modules/cachedb_nats/**'
      - 'modules/cachedb_nats_fts/**'
      - 'modules/nats_consumer/**'
      - 'modules/tls_mgm/**'
      - 'modules/tls_openssl/**'
      - '.github/workflows/nats-tls-backends.yml'
  pull_request:
    paths:
      - 'lib/nats/**'
      - 'modules/event_nats/**'
      - 'modules/cachedb_nats/**'
      - 'modules/cachedb_nats_fts/**'
      - 'modules/nats_consumer/**'
      - 'modules/tls_mgm/**'
      - 'modules/tls_openssl/**'
      - '.github/workflows/nats-tls-backends.yml'

jobs:
  tls_mgm_smoke:
    name: tls_mgm NATS TLS smoke
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps + build libnats from source
        run: |
          # Ubuntu's libnats-dev predates several symbols referenced
          # by lib/nats/nats_dl_table.def (kvStore_WatchMulti,
          # kvStore_WatchAll-with-opts, ...); the X-macro that
          # materialises the dl table needs every symbol declared
          # in nats/nats.h at compile time even though the actual
          # link is lazy via dlopen.  Build pinned upstream so the
          # symbol set matches what lib/nats was developed against.
          set -e
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev \
            libpcre3-dev libxml2-dev cmake \
            nats-server
          # One pinned nats.c SHA across every CI leg (P5.1); the pin
          # lives in install_libnats.sh.  TLS=ON: this leg exercises
          # NATS-over-TLS.
          SUDO=sudo LIBNATS_TLS=ON sh scripts/build/install_libnats.sh
      - name: Build OpenSIPS core + tls_mgm + NATS modules
        run: |
          set -e
          make -j"$(nproc)" opensips
          for m in signaling sl tm rr maxfwd sipmsgops proto_udp \
                   tls_mgm tls_openssl \
                   cachedb_nats event_nats nats_consumer; do
            make modules=modules/$m modules
          done
      - name: Run lib/nats tls_mgm smoke
        run: |
          set -e
          # The smoke spins up its own private nats-server with self-
          # signed certs under a per-test workdir, boots opensips with
          # tls_mgm + cachedb_nats against it, and asserts handshake
          # completion plus negative scenarios (no tls_mgm loaded, no
          # 'nats' client_domain, ca_dir directory path, verify_cert=0).
          bash lib/nats/tests/test_tls_mgm_smoke.sh
