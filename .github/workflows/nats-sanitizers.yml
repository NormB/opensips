# Sanitizer CI for the NATS modules.
#
# Builds the four NATS test suites (lib/nats, event_nats, cachedb_nats,
# nats_consumer) under AddressSanitizer + UBSan and ThreadSanitizer.
# Unit tests are pure C with their own main() functions, so they don't
# require a running nats-server -- which keeps this workflow cheap and
# fast vs. the integration shell tests in modules/nats_consumer/tests/
# (those still need the docker-compose stack).
#
# Why two sanitizer variants:
#   asan_ubsan : catches use-after-free, OOB, signed/unsigned UB, etc.
#   tsan       : catches data races -- the connection pool, ring,
#                ack-IPC and registry are all multi-process+pthread.
#
# These checks complement Main CI; they don't replace it.

name: NATS Sanitizers

# Auto-cancel previous still-pending runs on the same ref when a new
# push comes in.  Without this, every commit on a busy day stacks
# more sanitizer jobs into the GitHub-hosted runner concurrency cap.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - 'lib/nats/**'
      - 'modules/event_nats/**'
      - 'modules/cachedb_nats/**'
      - 'modules/cachedb_nats_fts/**'
      - 'modules/nats_consumer/**'
      - '.github/workflows/nats-sanitizers.yml'
  pull_request:
    paths:
      - 'lib/nats/**'
      - 'modules/event_nats/**'
      - 'modules/cachedb_nats/**'
      - 'modules/cachedb_nats_fts/**'
      - 'modules/nats_consumer/**'
      - '.github/workflows/nats-sanitizers.yml'
  workflow_dispatch:

jobs:
  sanitize:
    name: ${{ matrix.variant }}
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: asan_ubsan
            cflags: "-fsanitize=address -fsanitize=undefined -fno-omit-frame-pointer -g -O0 -Wall"
            ldflags: "-fsanitize=address -fsanitize=undefined"
            check_target: check
            asan_options: "abort_on_error=1:detect_leaks=1:halt_on_error=1"
            ubsan_options: "halt_on_error=1:print_stacktrace=1"
          - variant: tsan
            # TSan fundamentally cannot share an address space with
            # ASan, so we run them as separate matrix entries.  The
            # check-tsan target in each test Makefile excludes the
            # ASan-pinned canaries (test_atomic_stats demonstrates a
            # volatile race; test_intersect_uaf relies on ASan UAF
            # detection; test_slurp_file_cap hard-codes -fsanitize=address).
            cflags: "-fsanitize=thread -fno-omit-frame-pointer -g -O0 -Wall"
            ldflags: "-fsanitize=thread"
            check_target: check-tsan
            asan_options: ""
            ubsan_options: ""

    env:
      DEBIAN_FRONTEND: noninteractive
      # All matrix-derived values are hoisted into env to keep them
      # out of inline shell strings -- recommended pattern from
      # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
      SAN_CFLAGS: ${{ matrix.cflags }}
      SAN_LDFLAGS: ${{ matrix.ldflags }}
      CHECK_TARGET: ${{ matrix.check_target }}
      ASAN_OPTIONS: ${{ matrix.asan_options }}
      UBSAN_OPTIONS: ${{ matrix.ubsan_options }}
      # TSan-specific: keep stacks small; expand if the suite ever
      # legitimately needs deeper backtraces.
      TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1"

    steps:
      # Bare ubuntu:24.04 container: actions/checkout needs git in PATH
      # or it falls back to the REST download, which hard-errors on the
      # submodules input.  Bootstrap git BEFORE checkout; the rest of
      # the deps (and install_libnats.sh, which lives in the repo) come
      # after it.
      - name: Bootstrap git for checkout
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps + libnats (pinned)
        run: |
          # apt's libnats-dev on ubuntu 22.04/24.04 ships libnats 3.7,
          # which predates kvStore_WatchMulti / kvStore_WatchAll-with-opts
          # and several other symbols referenced by lib/nats/nats_dl_table.def.
          # install_libnats.sh builds the ONE pinned nats.c SHA every CI
          # leg shares (P5.1); LIBNATS_TLS=ON for dev-env parity.  The
          # container runs as root, so SUDO stays empty.
          apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libuv1-dev cmake wget
          LIBNATS_TLS=ON sh scripts/build/install_libnats.sh

      - name: Lint — no unredacted URLs in log calls
        run: ./lib/nats/tests/lint_url_redaction.sh

      - name: Lint — no raw KV row keys (AoRs) in log calls
        run: ./lib/nats/tests/lint_key_redaction.sh

      - name: Strict-gate selftest (skip-vs-fail contract)
        run: ./modules/cachedb_nats/tests/sip_e2e/selftest_strict.sh

      - name: lib/nats unit tests
        run: |
          make -C lib/nats/tests \
              CFLAGS="${SAN_CFLAGS}" LDFLAGS="${SAN_LDFLAGS}" ASAN="" "${CHECK_TARGET}"

      - name: event_nats unit tests
        run: |
          make -C modules/event_nats/tests \
              CFLAGS="${SAN_CFLAGS}" LDFLAGS="${SAN_LDFLAGS}" ASAN="" "${CHECK_TARGET}"

      - name: cachedb_nats unit tests
        run: |
          make -C modules/cachedb_nats/tests \
              CFLAGS="${SAN_CFLAGS}" LDFLAGS="${SAN_LDFLAGS}" ASAN="" "${CHECK_TARGET}"

      - name: nats_consumer unit tests
        run: |
          # nats_consumer/tests/Makefile already builds test_slurp_file_cap
          # with -fsanitize=address; we override CFLAGS/LDFLAGS to apply
          # the matrix-selected sanitizer to every binary uniformly.
          make -C modules/nats_consumer/tests \
              CFLAGS="-DTEST_SHIM -I. -I../../.. ${SAN_CFLAGS}" \
              LDFLAGS="-lpthread ${SAN_LDFLAGS}" \
              "${CHECK_TARGET}"

  # Plain-compiler warning gate (P5.6): gcc + clang at -O2 with -Werror.
  # -O2 matters -- flow-dependent warnings (-Wclobbered and friends) only
  # fire with optimization, and the sanitizer legs build -O0.  Runs the
  # check-tsan subset: that list is exactly "tests that do not REQUIRE a
  # sanitizer runtime" (the ASan-pinned UAF/leak canaries prove their bug
  # class through ASan and cannot pass without it).
  #
  # The -Wno- suppressions are for CORE headers the NATS code includes
  # but does not own:
  #   -Wno-sign-compare        parser/msg_parser.h
  #   -Wno-unused-parameter    mem/f_parallel_malloc.h
  #   -Wno-ignored-attributes  dprint.h (clang)
  werror:
    name: werror_${{ matrix.cc }}
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    env:
      DEBIAN_FRONTEND: noninteractive
      WFLAGS: "-g -O2 -Wall -Wextra -Werror -Wno-sign-compare -Wno-unused-parameter -Wno-ignored-attributes"
      MCC: ${{ matrix.cc }}

    steps:
      - name: Bootstrap git for checkout
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps + libnats (pinned)
        run: |
          apt-get install -y --no-install-recommends \
            build-essential clang pkg-config libssl-dev libuv1-dev cmake wget
          sh scripts/build/install_libnats.sh

      - name: lib/nats unit tests (-Werror)
        run: make -C lib/nats/tests CC="${MCC}" CFLAGS="${WFLAGS}" ASAN="" check-tsan

      - name: event_nats unit tests (-Werror)
        run: make -C modules/event_nats/tests CC="${MCC}" CFLAGS="${WFLAGS}" ASAN="" check-tsan

      - name: cachedb_nats unit tests (-Werror)
        run: make -C modules/cachedb_nats/tests CC="${MCC}" CFLAGS="${WFLAGS}" ASAN="" check-tsan

      - name: nats_consumer unit tests (-Werror)
        run: |
          make -C modules/nats_consumer/tests CC="${MCC}" \
            CFLAGS="-DTEST_SHIM -I. -I../../.. ${WFLAGS}" \
            LDFLAGS="-lpthread" check-tsan
