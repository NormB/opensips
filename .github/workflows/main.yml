# This is a basic workflow to help you get started with Actions

name: Main CI

# Cancel superseded runs on the same ref so a rapid series of pushes
# doesn't pile up the queue.  Main CI's matrix is ~20 jobs per run;
# without this, every commit on a busy day stacks ~20 more runner
# jobs into the GitHub-hosted concurrency cap of 20 (free tier).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Controls when the action will run.
on:
  # Triggers the workflow on all push or pull request events
  push:
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    container:
      image: ubuntu:${{ matrix.os }}
    env:
      COMPILER: ${{ matrix.compiler }}
      BUILD_OS: ubuntu:${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [20.04, 22.04, 24.04]
        compiler: ['gcc', 'clang']
        include:
          - os: 20.04
            compiler: 'gcc-9'
          - os: 20.04
            compiler: 'gcc-10'
          - os: 20.04
            compiler: 'clang-9'
          - os: 20.04
            compiler: 'clang-10'
          - os: 22.04
            compiler: 'gcc-11'
          - os: 22.04
            compiler: 'gcc-12'
          - os: 22.04
            compiler: 'clang-11'
          - os: 22.04
            compiler: 'clang-12'
          - os: 22.04
            compiler: 'clang-13'
          - os: 22.04
            compiler: 'clang-14'
          - os: 22.04
            compiler: 'clang-15'
          - os: 24.04
            compiler: 'clang-16'
          - os: 24.04
            compiler: 'clang-17'
          - os: 24.04
            compiler: 'clang-18'

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Install git
        run: |
          apt-get update
          apt-get install -y git lsb-release gnupg2 wget

      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      # Cache the libnats C client SDK install across runs.  Keyed on
      # the install script + Ubuntu version (libnats is a native
      # binary, so the OS image matters; compilers share the cache).
      # Bumping LIBNATS_VERSION inside install_libnats.sh changes the
      # hash and triggers a rebuild.
      - name: Cache libnats C client
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/include/nats
            /usr/local/lib/libnats*
            /usr/local/lib/pkgconfig/libnats*
            /usr/local/lib/cmake/cnats
          key: libnats-${{ matrix.os }}-${{ hashFiles('scripts/build/install_libnats.sh') }}

      - name: Install dependencies
        run: |
          sh -x scripts/build/reset_sources.sh
          sh -x scripts/build/install_depends.sh

      - name: Build
        run: sh -x scripts/build/do_build.sh

  all_done:
    needs: build
    uses: ./.github/workflows/.notify.yml
    with:
      job_name: "Main CI"
      job_result: ${{ needs.build.result }}
    if: ${{ always() }}
